setup:
  project: <your-project>
  config: dev

# =========================
# シークレット管理方針
# =========================
# チーム共有・本番クレデンシャル類は Doppler で集中管理する。
# 非機密の設定値は env/config.yaml、ローカルだけの秘密情報は env/secret.yaml に置く。
# env/secret.yaml は .gitignore で除外し、コミットしない。
# 値は登録せず、キー名と用途だけをコメントで管理する。

# =========================
# 認証・ユーザー管理
# =========================
# AUTH_SECRET_KEY
# OWNER_USER_IDS        # カンマ区切りで複数指定可

# =========================
# AI / LLM
# =========================
# AI_OPENAI_API_KEY

# =========================
# 通知 / 外部連携
# =========================
# DISCORD_WEBHOOK_URL

# =========================
# インフラ / クラウド
# =========================
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY

# =========================
# Doppler 初期化コマンド
# =========================
# doppler setup --project <your-project> --config dev --no-interactive
